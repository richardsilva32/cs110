<!DOCTYPE html> <!-- Declares the document type and tells the browser to use HTML5 -->

<html lang="en"> <!-- Root element of the webpage; lang="en" specifies that the content is in English -->

<head> <!-- Contains metadata, title, stylesheets, fonts, and icons -->

    <title>Instructors | Strike a Chord.</title>
    <!-- Text displayed in the browser tab -->

    <meta charset="utf-8">
    <!-- Sets the character encoding to UTF-8 so all characters display correctly -->

    <meta name="description"
          content="Our instructors are knowledgeable and professional.">
    <!-- Provides a description of the webpage for search engines -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes the page responsive so it displays properly on mobile devices -->

    <link rel="stylesheet" href="css/styles.css">
    <!-- Links the external CSS stylesheet used to style the webpage -->

    <!-- Google Font: DM Serif Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- Establishes an early connection to Google Fonts for faster loading -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Establishes an early connection to Google's font file server -->

    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap"
        rel="stylesheet">
    <!-- Loads the DM Serif Display font -->

    <!-- Google Font: Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- Establishes another connection to Google Fonts -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Establishes another connection to the font file server -->

    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- Loads the Roboto font family -->

    <!-- Favicon and device icons -->
    <link rel="shortcut icon" href="images/favicon.ico">
    <!-- Standard favicon displayed in browser tabs -->

    <link rel="icon" type="images/png" sizes="32x32" href="images/favicon-32.png">
    <!-- 32x32 PNG favicon -->

    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <!-- Icon used when the site is saved to an Apple device home screen -->

    <link rel="icon" sizes="192x192" href="images/andriod-chrome-192.png">
    <!-- 192x192 icon used by Android devices and Chrome -->
</head>

    <script src="scripts/script.js"></script>

    <nav class="mobile-nav">

            <a href="instructors.html">Instructors</a>

        </a>
    </nav>

    <header>
        <!-- Header section containing the website title -->

        </figure>

            </a>

</html> <!-- Closing tag for the HTML document -->
