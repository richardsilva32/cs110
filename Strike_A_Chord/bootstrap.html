<!doctype html> <!-- Declares the document type and tells the browser to use HTML5 -->
<html lang="en"> <!-- Root element of the webpage; lang="en" specifies that the page is written in English -->

  <head> <!-- Contains metadata, stylesheets, icons, and the page title -->

    <!-- Required meta tags -->

    <meta charset="utf-8">
    <!-- Sets the character encoding to UTF-8 so special characters and symbols display correctly -->

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Makes the website responsive by matching the viewport width to the device width -->

    <meta name="description" content="Strike a Chord specializes in music lessons and music rental equipment">
    <!-- Provides a description of the website for search engines and social sharing -->

    <!-- Favicon -->
    <link rel="shortcut icon" href="images/favicon.ico">
    <!-- Standard favicon displayed in browser tabs -->

    <link rel="icon" type="images/png" sizes="32x32" href="images/favicon-32.png">
    <!-- 32x32 PNG favicon.
         Note: type should normally be "image/png" instead of "images/png". -->

    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <!-- Icon used when the site is saved to an iPhone or iPad home screen -->

    <link rel="icon" sizes="192x192" href="images/android-chrome-192.png">
    <!-- Large icon used by Android devices and Chrome -->

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous">
    <!-- Loads Bootstrap 5 CSS from a CDN.
         integrity verifies the file has not been modified.
         crossorigin allows the file to be loaded securely from another domain. -->

    <!-- My Style Sheet -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Links to a custom stylesheet containing additional site-specific styles -->

    <title>Music Lessons - Rentals | Strike a Chord.</title>
    <!-- Text displayed in the browser tab and used by search engines -->

  </head>

  <body> <!-- Contains all visible content of the webpage -->

    <!-- Bootstrap Navigation bar -->
    <nav class="navbar navbar-dark bg-dark-purple d-md-none">
      <!-- Navigation bar.
           navbar applies Bootstrap navbar styling.
           navbar-dark adjusts text color for dark backgrounds.
           bg-dark-purple is a custom class for a purple background.
           d-md-none hides this navbar on medium and larger screens. -->

      <a class="navbar-brand" href="index.html">Strike a Chord&#9836;</a>
      <!-- Brand/logo link.
           &#9836; displays a musical note symbol (♫). -->

      <!-- Hamburger menu icon -->
      <button
        class="navbar toggler"
        type="button"
        data-toggle="collapse"
        data-target="#navbarResponsive"
        aria-controls="navbarResponsive"
        aria-expanded="false"
        aria-label="Toggle navigation">
        <!-- Button that shows and hides the navigation links on small screens.
             aria-* attributes improve accessibility.-->

        <span class="navbar-toggler-icon"></span>
        <!-- Displays the hamburger icon -->
      </button>

      <h1></h1>
      <!-- Empty heading element. -->

      <!-- Navbar links -->
      <div class="collapse navbar-collapse" id="navbarResponsive">
        <!-- Collapsible section controlled by the hamburger button -->

        <ul class="navbar-nav ml-auto">
          <!-- Navigation list.-->

          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <!-- Link to the homepage -->

          <li class="nav-item">
            <a class="nav-link" href="lessons.html">Lessons</a>
          </li>
          <!-- Link to the Lessons page -->

          <li class="nav-item">
            <a class="nav-link" href="instructors.html">Instructors</a>
          </li>
          <!-- Link to the Instructors page -->

          <li class="nav-item">
            <a class="nav-link" href="rentals.html">Rentals</a>
          </li>
          <!-- Link to the Rentals page -->

          <li class="nav-item">
            <a class="nav-link" href="contact.html">Contact</a>
          </li>
          <!-- Link to the Contact page -->
        </ul>
      </div>
    </nav>

    <!-- Header and Hero Image -->
    <header class="jumbotron jumbotron-fluid text-center hero">
      <!-- Large hero section at the top of the page.-->

      <div class="container welcome">
        <!-- Centers and constrains the content width.
             welcome is a custom CSS class for additional styling. -->

        <h1 class="display-3 text-dark-purple">Welcome to Strike a Chord</h1>
        <!-- Main heading.
             display-3 makes the text large.
             text-dark-purple is a custom class that sets the text color. -->

        <a
          href="contact.html"
          role="button"
          class="btn btn-outline-secondary btn-lg text-white bg-dark-purple">
          Try a Free Lesson
        </a>
        <!-- Styled link that appears as a large button.
             role="button" improves accessibility.
             Bootstrap button classes control appearance and size. -->
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="container-fluid">
      <!-- Main page content spanning the full width of the viewport -->

      <div class="row">
        <!-- Bootstrap grid row -->

        <!-- First column: Lessons -->
        <div class="col-sm-4">
          <!-- Occupies one-third of the row on small screens and larger -->

          <figure>
            <!-- Groups the image and its related content -->

            <a href="lessons.html">
              <img
                src="images/child-guitar.jpg"
                alt="child with a smile holding a guitar"
                class="img-fluid rounded">
            </a>
            <!-- Responsive image with rounded corners linking to the Lessons page -->

            <h1>Lessons</h1>
            <!-- Section heading -->

            <p class="lead">
              We offer piano, guitar, and violin lessons.
            </p>
            <!-- Section description -->
          </figure>
        </div>

        <!-- Second column: Instructors -->
        <div class="col-sm-4">
          <figure>
            <a href="instructors.html">
              <img
                src="images/piano-lesson.jpg"
                alt="piano teacher and student sitting at a piano"
                class="img-fluid rounded">
            </a>
            <!-- Responsive image linking to the Instructors page -->

            <h1>Instructors</h1>

            <p class="lead">
              Meet our talented and professional instructors.
            </p>
          </figure>
        </div>

        <!-- Third column: Rentals -->
        <div class="col-sm-4">
          <figure>
            <a href="rentals.html">
              <img
                src="images/violin-on-piano.jpg"
                alt="violin setting on top of piano keys"
                class="img-fluid rounded">
            </a>
            <!-- Responsive image linking to the Rentals page -->

            <h1>Rentals</h1>

            <p class="lead">
              We rent musical equipment.
            </p>
          </figure>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="jumbotron-fluid text-center p-5 bg-dark-purple">
      <!-- Bottom section of the page.
           text-center centers all text.
           p-5 adds padding.
           bg-dark-purple applies a custom purple background color. -->

      <div class="container text-white">
        <!-- Centers the content and makes all text white -->

        <p>&copy; Copyright 2021. All Rights Reserved.</p>
        <!-- Copyright notice.
             &copy; displays the © symbol. -->

        <p>
          <a href="malito:lessons@strikeachord.net" class="text-white">
            lessons@strikeachord.net
          </a>
        </p>
        <!-- Email link.
             Note: "malito:" is misspelled and should be "mailto:" so the link opens an email program. -->

        <div class="social">
          <!-- Custom container for social media icons -->

          <a href="https://www.facebook.com" target="_blank">
            <img
              src="images/facebook-logo.png"
              alt="The facebook logo"
              class="pr-4">
          </a>
          <!-- Facebook link opening in a new tab.
               pr-4 adds right padding in Bootstrap 4.
               In Bootstrap 5, use pe-4 instead. -->

          <a href="https://www.twitter.com" target="_blank">
            <img
              src="images/twitter-logo.png"
              alt="The twitter logo">
          </a>
          <!-- Twitter link opening in a new tab -->
        </div>
      </div>
    </footer>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous">
    </script>
    <!-- Loads Bootstrap JavaScript and Popper for interactive components
         such as the collapsible navigation menu -->

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!-- The commented section below shows an alternative method for loading
         Popper and Bootstrap as two separate files. -->

    <!-- Custom JavaScript -->
    <script src="scripts/script.js"></script>
    <!-- Links to your own JavaScript file for additional functionality -->

  </body>
</html>
